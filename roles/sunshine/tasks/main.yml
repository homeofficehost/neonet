---
- name: sunshine | check if installed
  stat:
    path: /Applications/Sunshine.app
  register: sunshine_app
  tags: sunshine

- name: sunshine | check for running process
  command: pgrep -f Sunshine
  register: sunshine_running
  failed_when: false
  changed_when: false
  tags: sunshine

- name: sunshine | install via homebrew
  homebrew_cask:
    name: sunshine
    state: present
  tags: sunshine

- name: sunshine | make executable
  file:
    path: /Applications/Sunshine.app/Contents/MacOS/sunshine
    mode: '+x'
  tags: sunshine

- name: sunshine | start service
  command: /Applications/Sunshine.app/Contents/MacOS/sunshine &
  ignore_errors: true
  changed_when: true
  when: sunshine_running.rc != 0
  tags: sunshine

- name: sunshine | wait for service
  wait_for:
    port: 47984
    delay: 5
    timeout: 60
  tags: sunshine

- name: sunshine | remind about screen recording permission
  debug:
    msg: |
      ⚠️  Sunshine requires Screen Recording permission.
      Go to: System Settings → Privacy & Security → Screen Recording → Enable Sunshine
      Then restart Sunshine.
  tags: sunshine
