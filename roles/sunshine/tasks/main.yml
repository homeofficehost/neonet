---
- name: sunshine | check if installed
  stat:
    path: /Applications/Sunshine.app
  register: sunshine_app
  tags: sunshine

- name: sunshine | check for running process
  command: pgrep -f Sunshine
  register: sunshine_running
  failed_when: false
  changed_when: false
  tags: sunshine

- name: sunshine | set version fact
  set_fact:
    sunshine_version: "0.23.1"
    sunshine_download_url: "https://github.com/LizardByte/Sunshine/releases/download/v0.23.1/Sunshine-macos-{{ sunshine_version }}.dmg"
  when: not sunshine_app.stat.exists
  tags: sunshine

- name: sunshine | debug download url
  debug:
    msg: "Downloading Sunshine from {{ sunshine_download_url }}"
  when: not sunshine_app.stat.exists
  tags: sunshine

- name: sunshine | download dmg
  get_url:
    url: "{{ sunshine_download_url }}"
    dest: "/tmp/sunshine.dmg"
    mode: '0644'
  when: not sunshine_app.stat.exists
  tags: sunshine

- name: sunshine | mount dmg
  command: hdiutil attach /tmp/sunshine.dmg -nobrowse -mountpoint /Volumes/sunshine
  when: not sunshine_app.stat.exists
  tags: sunshine

- name: sunshine | copy to Applications
  command: cp -R /Volumes/sunshine/Sunshine.app /Applications/
  when: not sunshine_app.stat.exists
  tags: sunshine

- name: sunshine | unmount dmg
  command: hdiutil detach /Volumes/sunshine
  when: not sunshine_app.stat.exists
  tags: sunshine

- name: sunshine | cleanup dmg
  file:
    path: "/tmp/sunshine.dmg"
    state: absent
  when: not sunshine_app.stat.exists
  tags: sunshine

- name: sunshine | start service
  command: /Applications/Sunshine.app/Contents/MacOS/sunshine &
  ignore_errors: true
  changed_when: true
  when: sunshine_running.rc != 0
  tags: sunshine

- name: sunshine | wait for service
  wait_for:
    port: 47984
    delay: 5
    timeout: 60
  tags: sunshine
