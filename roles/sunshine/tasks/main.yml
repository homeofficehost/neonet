---
- name: sunshine | check if service is running
  command: brew services info lizardbyte/homebrew/sunshine-beta --json
  register: sunshine_service_info
  changed_when: false
  failed_when: false
  tags: sunshine

- name: sunshine | parse service status
  set_fact:
    sunshine_running: >-
      {{ (sunshine_service_info.stdout | from_json)[0].running | default(false) }}
  when: sunshine_service_info.rc == 0 and sunshine_service_info.stdout | length > 0
  tags: sunshine

- name: sunshine | ensure service is started
  command: brew services start lizardbyte/homebrew/sunshine-beta
  when: not (sunshine_running | default(false) | bool)
  tags: sunshine

- name: sunshine | wait for service
  wait_for:
    port: "{{ sunshine_port }}"
    delay: 5
    timeout: 60
  tags: sunshine

- name: sunshine | remind about screen recording permission
  debug:
    msg: |
      ⚠️  Sunshine requires Screen Recording permission.
      Go to: System Settings → Privacy & Security → Screen Recording → Enable Sunshine
      Then restart Sunshine.
  tags: sunshine
