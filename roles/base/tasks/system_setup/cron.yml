- name: system setup | cron | install cron package
  tags: packages,cron
  package:
    name:
      - "{{ cron_package }}"
    state: latest

- name: system setup | cron | schedule automatic ansible provisioning
  tags: cron
  cron:
    name: "ansible provision"
    user: "{{ username }}"
    hour: "{{ ansible_cron_hour | default('*') }}"
    minute: "{{ ansible_cron_minute | default('*/30') }}"
    job: "{ date; /usr/local/bin/provision; RC=$?; date; echo \"Exit code: $RC\"; } >> /var/log/ansible_provision.log 2>&1 && if [ $RC -eq 0 ]; then echo $(date) > /var/log/ansible_provision_last_run.txt; fi"
  when: ansible_distribution != "Darwin"

- name: system setup | cron | schedule automatic ansible provisioning on macOS
  tags: cron
  cron:
    name: "ansible provision"
    user: "{{ username }}"
    hour: "{{ ansible_cron_hour | default('*') }}"
    minute: "{{ ansible_cron_minute | default('*/30') }}"
    job: "{ date; /usr/local/bin/provision; RC=$?; date; echo \"Exit code: $RC\"; } >> /Users/{{ username }}/ansible_provision.log 2>&1 && if [ $RC -eq 0 ]; then echo $(date) > /Users/{{ username }}/ansible_provision_last_run.txt; fi"
  when: ansible_distribution == "Darwin"

