---
- hosts: all
  connection: local
  gather_facts: true
  tags: always
  any_errors_fatal: true

  roles:
    - base
    - workstation
    - docker
    - sunshine
    - zerotier

  post_tasks:
    - name: "🚀 success | provisioning complete"
      debug:
        msg: |
          ╔════════════════════════════════════════════════════════════════╗
          ║                                                                ║
          ║          🚀  PROVISIONING COMPLETE  🚀                         ║
          ║                                                                ║
          ║          Host:        {{ ansible_hostname }}                   ║
          ║          System:      {{ ansible_distribution }}                ║
          ║                      {{ ansible_distribution_version }}          ║
          ║          Completed:   {{ ansible_date_time.date }}              ║
          ║                      {{ ansible_date_time.time }}                ║
          ║          Roles:       base ✓  workstation ✓                   ║
          ║                                                                ║
          ║          All systems nominal. Ready for action! 🎯            ║
          ║                                                                ║
          ╚════════════════════════════════════════════════════════════════╝
      run_once: true
      when: hostvars[groups['all'][0]]['provision_changed'] | default(false)

    - name: "🔔 success | send macOS notification"
      shell: >
        osascript -e '
        display notification
        "Host {{ ansible_hostname }} — all roles applied successfully"
        with title "🚀 Dotfiles Provisioned!"
        subtitle "{{ ansible_date_time.date }} {{ ansible_date_time.time }}"
        sound name "Glass"'
      ignore_errors: true
      run_once: true
      changed_when: false
      when: hostvars[groups['all'][0]]['provision_changed'] | default(false)

    - name: "🔊 success | voice announcement"
      shell: >
        afplay {{ ansible_user_dir
        }}/.dotfiles/roles/workstation/files/sounds/provisioning-success.mp3
      ignore_errors: true
      run_once: true
      changed_when: false
      when: hostvars[groups['all'][0]]['provision_changed'] | default(false)

    - name: "❌ failure | play failure sound"
      shell: >
        afplay {{ ansible_user_dir
        }}/.dotfiles/roles/workstation/files/sounds/provisioning-failure.mp3
      ignore_errors: true
      run_once: true
      when: ansible_failed_task is defined

    - name: "🔔 idempotent | system sound when no changes"
      shell: afplay /System/Library/Sounds/Tink.aiff
      ignore_errors: true
      run_once: true
      changed_when: false
      when: >
        not (hostvars[groups['all'][0]]['provision_changed'] | default(false))
