---
- hosts: all
  connection: local
  gather_facts: true
  tags: always

  pre_tasks:
    - name: "Skip if this host is not the target"
      set_fact:
        is_target_host: "{{ inventory_hostname == ansible_hostname }}"
      tags: always

    - name: "Skip non-target hosts"
      meta: end_play
      when: not is_target_host | bool
      tags: always

  roles:
    - base
    - workstation

  post_tasks:
    - name: "🚀 success | provisioning complete"
      debug:
        msg: |
          
          ╔════════════════════════════════════════════════════════════════╗
          ║                                                                ║
          ║          🚀  PROVISIONING COMPLETE  🚀                         ║
          ║                                                                ║
          ║          Host:        {{ ansible_hostname }}                   ║
          ║          System:      {{ ansible_distribution }} {{ ansible_distribution_version }}  ║
          ║          Completed:   {{ ansible_date_time.date }} {{ ansible_date_time.time }}     ║
          ║          Roles:       base ✓  workstation ✓                   ║
          ║                                                                ║
          ║          All systems nominal. Ready for action! 🎯            ║
          ║                                                                ║
          ╚════════════════════════════════════════════════════════════════╝
          
      run_once: true

    - name: "🔔 success | send macOS notification"
      shell: >
        osascript -e '
        display notification
        "Host {{ ansible_hostname }} — all roles applied successfully"
        with title "🚀 Dotfiles Provisioned!"
        subtitle "{{ ansible_date_time.date }} {{ ansible_date_time.time }}"
        sound name "Glass"'
      ignore_errors: true
      run_once: true
      changed_when: false

    - name: "🔊 success | voice announcement"
      shell: say -v Daniel "Provisioning complete. All systems are ready for launch."
      ignore_errors: true
      run_once: true
      changed_when: false
      when: ansible_env.TERM is defined and ansible_env.TERM | length > 0
