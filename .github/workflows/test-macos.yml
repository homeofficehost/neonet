name: Test macOS Setup

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:  # Permite execução manual

jobs:
  syntax-check:
    name: Ansible Syntax Check
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Install Ansible
      run: |
        sudo apt-get update
        sudo apt-get install -y ansible
        ansible --version
    
    - name: Check Ansible syntax
      run: |
        ansible-playbook --syntax-check -i hosts local.yml
    
    - name: Check bootstrap script syntax
      run: |
        bash -n bootstrap.sh
        bash -n update.sh
  
  test-macos:
    name: Test on macOS
    runs-on: macos-latest
    needs: syntax-check
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Setup test environment
      run: |
        # Criar vault key fake para testes
        echo "test-vault-key" > ~/.vault_key
        
        # Criar diretórios necessários
        mkdir -p ~/.ssh
        chmod 700 ~/.ssh
        
        # Verificar estrutura
        echo "=== Estrutura do Projeto ==="
        find . -name "*.yml" -type f | head -20
    
    - name: Install Ansible on macOS
      run: |
        brew install ansible
        ansible --version
    
    - name: Ansible Syntax Check on macOS
      run: |
        ansible-playbook --syntax-check -i hosts local.yml
    
    - name: Ansible Check Mode (Dry Run)
      continue-on-error: true  # Esperamos que falhe em partes específicas do macOS
      run: |
        echo "=== Check Mode - Base Role ==="
        ansible-playbook --check -i hosts local.yml --tags base -v 2>&1 | head -100 || true
        
        echo "=== Check Mode - Workstation Role ==="
        ansible-playbook --check -i hosts local.yml --tags workstation -v 2>&1 | head -100 || true
    
    - name: Test Brewfile Syntax
      run: |
        brew bundle check --file=Brewfile 2>&1 | head -50 || true
    
    - name: Validate Bootstrap Script
      run: |
        echo "=== Bootstrap Script Analysis ==="
        # Verificar se o script pode ser analisado
        bash -n bootstrap.sh && echo "✓ Syntax OK"
        bash -n update.sh && echo "✓ Update Syntax OK"
        
        # Verificar comandos críticos
        grep -n "ansible-pull" bootstrap.sh || echo "✗ ansible-pull not found!"
        grep -n "homebrew" bootstrap.sh -i || echo "✗ Homebrew check not found!"
  
  test-docker:
    name: Test in Docker (Linux Mode)
    runs-on: ubuntu-latest
    needs: syntax-check
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Build Test Container
      run: |
        cat > Dockerfile.test << 'EOF'
        FROM ubuntu:22.04
        
        RUN apt-get update && apt-get install -y \
            ansible \
            git \
            curl \
            sudo \
            python3-pip \
            software-properties-common \
            && rm -rf /var/lib/apt/lists/*
        
        RUN useradd -m -s /bin/bash tg && \
            echo "tg ALL=(ALL) NOPASSWD:ALL" >> /etc/sudoers
        
        COPY . /home/tg/dotfiles
        RUN chown -R tg:tg /home/tg/dotfiles
        
        WORKDIR /home/tg/dotfiles
        USER tg
        
        # Criar inventory de teste
        RUN echo "[workstation]" > test_hosts && \
            echo "localhost ansible_connection=local ansible_user=tg" >> test_hosts
        
        CMD ["ansible-playbook", "--syntax-check", "-i", "test_hosts", "local.yml"]
        EOF
        
        docker build -f Dockerfile.test -t ansible-test .
    
    - name: Run Syntax Check in Container
      run: |
        docker run --rm ansible-test
    
    - name: Clean up
      run: |
        docker rmi ansible-test || true
  
  check-variaveis:
    name: Check Variables and Structure
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Install yamllint
      run: |
        pip install yamllint
    
    - name: Check YAML syntax
      run: |
        yamllint -d relaxed . 2>&1 | head -50 || true
    
    - name: Verify Required Files Exist
      run: |
        echo "=== Verificando Arquivos Essenciais ==="
        
        files=(
          "ansible.cfg"
          "hosts"
          "local.yml"
          "bootstrap.sh"
          "Brewfile"
          "roles/base/tasks/main.yml"
          "roles/base/vars/Darwin.yml"
          "roles/workstation/tasks/main.yml"
          "group_vars/all"
        )
        
        for file in "${files[@]}"; do
          if [ -f "$file" ]; then
            echo "✓ $file existe"
          else
            echo "✗ $file NÃO ENCONTRADO!"
            exit 1
          fi
        done
    
    - name: Check for Common Issues
      run: |
        echo "=== Verificando Problemas Comuns ==="
        
        # Verificar referências a 'velociraptor' (deve usar variável)
        echo "Checando referências hardcoded a 'velociraptor':"
        grep -r "velociraptor" roles/ --include="*.yml" | grep -v "{{" | head -10 || echo "✓ OK - Nenhuma referência hardcoded encontrada"
        
        # Verificar variáveis não definidas
        echo ""
        echo "Checando variáveis usadas:"
        grep -r "dconf_package\|python_psutil_package" roles/ --include="*.yml" | head -5 || echo "✓ OK"
        
        # Verificar se tasks têm tags
        echo ""
        echo "Tasks sem tags (recomendado ter):"
        grep -B1 "^  - name:" roles/base/tasks/*.yml | grep -v "tags:" | head -10 || echo "✓ OK"
